models:
  - name: bProduct
    columns:
      - name: product_sk
        tests:
          - not_null
          - unique
      - name: department
        data_test:
           - accepted_values:
              arguments:
                values: ['Grocery', 'Health & Beauty', 'Electronics', 'Home', 'Toys']
              config:
                severity: warn
  
  - name: bDates
    columns:
      - name: is_weekend
        data_test:
           - accepted_values:
              arguments:
                values: ['false', 'true']
              config:
                severity: warn
